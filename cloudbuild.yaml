steps:
  # 1. Build backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/btp-backend', '-f', 'Dockerfile.backend', '.']

  # 2. Push backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/btp-backend']

  # 3. Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'btp-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/btp-backend'
      - '--region'
      - '$_REGION'
      - '--allow-unauthenticated'
      - '--port'
      - '8000'

  # 4. Extract Backend URL and Build Frontend
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BACKEND_URL=$$(gcloud run services describe btp-backend --region $_REGION --format="value(status.url)")
        echo "Extracted Backend URL: $$BACKEND_URL"
        docker build -t gcr.io/$PROJECT_ID/btp-frontend --build-arg NEXT_PUBLIC_API_URL=$$BACKEND_URL -f btp-tactical/Dockerfile btp-tactical/

  # 5. Push Frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/btp-frontend']

  # 6. Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'btp-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/btp-frontend'
      - '--region'
      - '$_REGION'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'

substitutions:
  _REGION: us-central1
  
options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/btp-backend'
  - 'gcr.io/$PROJECT_ID/btp-frontend'
